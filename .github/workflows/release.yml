name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone VST3 SDK
        run: git clone --recursive https://github.com/steinbergmedia/vst3sdk.git

      - name: Build
        run: ./build.bat

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: WetReverb/build/VST3/Release/WetReverb.vst3/
          retention-days: 1

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone VST3 SDK
        run: git clone --recursive https://github.com/steinbergmedia/vst3sdk.git

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ libstdc++6 libx11-xcb-dev libxcb-util-dev \
            libxcb-cursor-dev libxcb-xkb-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libfontconfig1-dev libcairo2-dev libgtkmm-3.0-dev libsqlite3-dev \
            libxcb-keysyms1-dev

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: WetReverb/build/VST3/Release/WetReverb.vst3/
          retention-days: 1

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone VST3 SDK
        run: git clone --recursive https://github.com/steinbergmedia/vst3sdk.git

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Verify macOS code signing
        run: |
          echo "Verifying code signature..."
          if [ -d "WetReverb/build/Release/WetReverb.vst3" ]; then
            codesign -v WetReverb/build/Release/WetReverb.vst3
          elif [ -d "WetReverb/build/VST3/Release/WetReverb.vst3" ]; then
            codesign -v WetReverb/build/VST3/Release/WetReverb.vst3
          else
            echo "ERROR: Plugin not found for signing verification"
            exit 1
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            WetReverb/build/Release/WetReverb.vst3/
            WetReverb/build/VST3/Release/WetReverb.vst3/
          if-no-files-found: warn
          retention-days: 1

  merge-and-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos

      - name: Debug artifact structure
        run: |
          echo "Windows artifact structure:"
          find artifacts/windows -type f | head -20
          echo ""
          echo "Linux artifact structure:"
          find artifacts/linux -type f | head -20
          echo ""
          echo "macOS artifact structure:"
          find artifacts/macos -type f | head -20

      - name: Merge into universal VST3
        run: |
          chmod +x scripts/merge-vst3.sh
          ./scripts/merge-vst3.sh

      - name: Code sign universal VST3 bundle
        run: |
          echo "Re-signing universal VST3 bundle for macOS..."
          codesign --force --deep --sign - build/WetReverb.vst3

      - name: Verify universal bundle signature
        run: |
          echo "Verifying universal bundle signature..."
          codesign -v build/WetReverb.vst3

      - name: Create ZIP archive
        run: |
          cd build
          zip -r ../WetReverb-${{ github.ref_name }}.zip WetReverb.vst3
          ls -la ../WetReverb-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: WetReverb-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
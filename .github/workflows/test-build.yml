name: Test Build

on:
  push:
    branches:
      - 'feature/**'
      - 'main'
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone VST3 SDK
        run: git clone --recursive https://github.com/steinbergmedia/vst3sdk.git

      - name: Build
        run: ./build.bat

      - name: Validate Windows plugin
        run: |
          echo "Running VST3 validator (47 tests)..."
          WetReverb/build/bin/Release/validator.exe WetReverb/build/VST3/Release/WetReverb.vst3

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone VST3 SDK
        run: git clone --recursive https://github.com/steinbergmedia/vst3sdk.git

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ libstdc++6 libx11-xcb-dev libxcb-util-dev \
            libxcb-cursor-dev libxcb-xkb-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libfontconfig1-dev libcairo2-dev libgtkmm-3.0-dev libsqlite3-dev \
            libxcb-keysyms1-dev

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Validate Linux plugin
        run: |
          echo "Running VST3 validator (47 tests)..."
          WetReverb/build/bin/Release/validator WetReverb/build/VST3/Release/WetReverb.vst3

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone VST3 SDK
        run: git clone --recursive https://github.com/steinbergmedia/vst3sdk.git

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Verify macOS code signing
        run: |
          echo "Verifying code signature..."
          if [ -d "WetReverb/build/Release/WetReverb.vst3" ]; then
            codesign -v WetReverb/build/Release/WetReverb.vst3
          elif [ -d "WetReverb/build/VST3/Release/WetReverb.vst3" ]; then
            codesign -v WetReverb/build/VST3/Release/WetReverb.vst3
          else
            echo "ERROR: Plugin not found for signing verification"
            exit 1
          fi

      - name: Validate macOS plugin
        run: |
          echo "Running VST3 validator (47 tests)..."
          if [ -f "WetReverb/build/bin/Release/validator" ]; then
            ./WetReverb/build/bin/Release/validator "WetReverb/build/VST3/Release/WetReverb.vst3"
          else
            echo "Validator not found, checking alternative locations..."
            find . -name "validator" -type f 2>/dev/null
            echo "Skipping validation - validator binary not located"
          fi